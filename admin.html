    margin-top:30px;

<body>

<h1>School Admin Panel</h1>

<input type="text" id="noticeInput"
placeholder="Enter Notice">

<button onclick="addNotice()">
Add Notice
</button>

<div id="result"></div>

<script>

function addNotice(){

const notice =
document.getElementById("noticeInput").value;

document.getElementById("result").innerHTML =
"Notice Added: " + notice;

}

</script>
