<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery - Maryam Memorial Institute</title>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

/* HEADER */

header{
    background:#002855;
    color:white;
    text-align:center;
    padding:25px;
}

header img{
    width:100px;
    border-radius:50%;
    background:white;
    padding:5px;
    margin-bottom:15px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    font-size:18px;
}

/* NAVBAR */

nav{
    background:#004080;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:yellow;
}

/* GALLERY SECTION */

.gallery-section{
    padding:60px 20px;
}

.gallery-section h2{
    text-align:center;
    font-size:45px;
    color:#002855;
    margin-bottom:40px;
}

/* GALLERY GRID */

.gallery-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    max-width:1300px;
    margin:auto;
}

.gallery-grid img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.gallery-grid img:hover{
    transform:scale(1.04);
}

/* FOOTER */

footer{
    background:#002855;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

footer p{
    margin-bottom:8px;
}

/* MOBILE VIEW */

@media(max-width:768px){

header h1{
    font-size:28px;
}

header p{
    font-size:14px;
}

nav{
    padding:10px;
}

nav a{
    display:inline-block;
    margin:5px;
    font-size:14px;
}

.gallery-section{
    padding:40px 15px;
}

.gallery-section h2{
    font-size:30px;
}

.gallery-grid img{
    height:220px;
}

footer{
    font-size:13px;
}

}

</style>

</head>
